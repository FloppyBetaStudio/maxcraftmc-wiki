baseURL = 'https://maxcraft.iruanp.com/'
locale = 'zh-cn'
title = 'MaxCraftMC 原版生存服务器'

DefaultContentLanguage = 'zh-cn'
enableEmoji = true
enableGitInfo = true
enableRobotsTXT = true
canonifyURLs = false
darkmode_js = ['assets/js/darkmode.js']
enableInlineShortcodes = true
timeZone = 'Asia/Shanghai'

[pagination]
pagerSize = 9

[sitemap]
changefreq = "weekly"
filename = "sitemap.xml"
priority = 0.7

[frontmatter]
lastmod = ["lastmod", ":git", "date", "publishDate"]

themesDir = "themes"
contentDir = "content"

[params]
author = "MaxCraftMC"
moto = "开放、自由、包容"
description = "MaxCraftMC 是长期开放的 Minecraft 原版生存服务器，支持 Java 版和基岩版玩家加入，永不删档，永久存档。"
keywords = ["MaxCraftMC", "MaxCraft", "Minecraft服务器", "我的世界服务器", "我的世界原版服务器", "原版生存服务器", "Java版服务器", "基岩版服务器", "公益服务器", "生存服", "红石服务器", "永不删档服务器", "永久存档服务器", "Minecraft Java服务器", "Minecraft基岩版服务器"]
og_image = "images/picture1.jpg"
disable_theme_toggle = false
disable_stay_uptodate = true
mainland_region = "China"
mainland_language = "zh-Hans"
baidu_verify_code = ""
so_verify_code = ""
sogou_verify_code = ""

[params.organization]
name = "MaxCraftMC"
url = "https://maxcraft.iruanp.com/"
logo = "/images/site-logo.svg"

[params.server]
name = "MaxCraftMC"
java = "mcje.iruanp.com"
bedrock = "mcbe.iruanp.com"
bedrock_port = "25565"
alternate = "mc2.iruanp.com:25565"
qq_group = "953762913"
qq_join_url = "https://qm.qq.com/q/b96Wv9PlMQ"
player_center = "https://mpc.iruanp.com/"
contact_email = "floppy@iruanp.com"

[params.p1]
heading = "服务器特点"
content = [
    { text = "MaxCraftMC 是一个开放、自由、包容的 Minecraft 原版生存服务器，欢迎 Java 版和基岩版玩家加入。" },
    { text = "服务器永不删档，永久存档，建筑玩家、养老玩家和红石玩家都可以放心长期建设。" },
    { text = "加入服务器和 QQ 群前，请先阅读服务器大宪章；账号查询和特定子服务器白名单申请请使用 MaxCraft 个人中心。" }
]
image = "images/picture1.jpg"

[params.p1.button]
text = "查看服务器地址"
url = "/posts/address/"

[params.p2]
heading = "原版生存与长期社区"
content = [
    { text = "我们的服务器采用原版生存玩法，注重玩家间的互动与合作。服务器内设有完善的领地系统，让玩家可以保护自己的建筑和资源，安心发展。" },
    { text = "在这里，你可以欣赏到众多令人惊叹的建筑群，从中世纪城堡到现代都市，从东方庭院到西方教堂，每一处都凝聚着玩家们的创意与心血。" },
    { text = "除了建筑，我们也鼓励玩家发展红石技术。服务器中有多个大型红石农场和自动化设施，这些都是玩家们智慧的结晶。" },
    { text = "为了促进玩家间的交流，我们不定期在服务器内举办赛事、探索活动等丰富多彩的社区活动。在这里，每个玩家都能找到志同道合的朋友，一起创造属于自己的传奇故事。" }
]
image = "images/picture2.jpg"

[params.p3]
heading = "加入我们"
content = [
    { text = "无论你是建筑达人、红石专家，还是刚接触 Minecraft 的新手，都能在 MaxCraftMC 找到属于自己的位置。" }
]
links = [
    { text = "服务器地址", url = "https://maxcraft.iruanp.com/posts/address/" },
    { text = "新玩家指南", url = "https://maxcraft.iruanp.com/posts/guide/" },
    { text = "MaxCraft 个人中心", url = "https://mpc.iruanp.com/" }
]
image = "images/picture1.jpg"
logos = []

[params.p4]
heading = "博客文章"
content = [
    { text = "MaxCraftMC是一个开放、自由、包容的Minecraft服务器。这里是MaxCraftMC服务器的网站，包括了这个我的世界服务器的各种信息，旨在让更多人和我们一起玩。" }
]

